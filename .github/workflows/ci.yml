name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run --cwd packages/core node_modules/.bin/vitest run --coverage
        env:
          CI: 'true'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: packages/core/coverage/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bun audit (npm vulnerabilities)
        run: bun audit
        continue-on-error: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        if: hashFiles('packages/desktop/src-tauri/Cargo.toml') != ''

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
        if: hashFiles('packages/desktop/src-tauri/Cargo.toml') != ''

      - name: Cargo audit (Rust vulnerabilities)
        run: cd packages/desktop/src-tauri && cargo audit
        if: hashFiles('packages/desktop/src-tauri/Cargo.toml') != ''
        continue-on-error: true

  e2e:
    name: E2E Tests (CLI)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Run CLI E2E tests
        run: bun run --cwd packages/cli node_modules/.bin/vitest run --include 'src/e2e/**/*.test.ts'
        env:
          CI: 'true'
          NO_COLOR: '1'
        timeout-minutes: 5
