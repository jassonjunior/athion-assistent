name: Release

# Triggered manually ou por PR merged com changesets
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch|minor|major)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump version and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version in all packages
        run: |
          BUMP=${{ github.event.inputs.version }}
          node -e "
            const fs = require('fs');
            const semver = require('semver') || null;
            const files = [
              'package.json',
              'packages/shared/package.json',
              'packages/core/package.json',
              'packages/cli/package.json',
              'packages/vscode/package.json',
              'packages/desktop/package.json',
            ];
            let newVersion;
            const root = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            const parts = root.version.split('.').map(Number);
            if ('$BUMP' === 'major') { parts[0]++; parts[1]=0; parts[2]=0; }
            else if ('$BUMP' === 'minor') { parts[1]++; parts[2]=0; }
            else { parts[2]++; }
            newVersion = parts.join('.');
            for (const f of files) {
              try {
                const pkg = JSON.parse(fs.readFileSync(f, 'utf-8'));
                pkg.version = newVersion;
                fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
              } catch {}
            }
            console.log('New version:', newVersion);
            fs.writeFileSync('/tmp/new_version', newVersion);
          "

      - name: Read new version
        id: version
        run: echo "value=$(cat /tmp/new_version)" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "chore: bump version to ${{ steps.version.outputs.value }}"
          git push

      - name: Create git tags
        run: |
          VERSION=${{ steps.version.outputs.value }}
          git tag "v${VERSION}"
          git tag "vscode-v${VERSION}"
          git tag "desktop-v${VERSION}"
          git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          draft: false
